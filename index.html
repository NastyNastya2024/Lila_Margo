<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра Лила</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="stars"></div>
  <div class="twinkling"></div>

  <header class="header">
    <nav class="nav">
      <a href="#game" class="nav-link">Игра Лила</a>
    </nav>
  </header>

  <main>
    <!-- Game Section -->
    <section id="game" class="section game-section">
      <div class="section-title-wrap">
        <span class="heading-icon-circle" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12,2 15,9 22,9 17,14 19,22 12,17 5,22 7,14 2,9 9,9"/></svg></span>
        <h2 class="section-title">Игра Лила</h2>
      </div>
      <div class="game-screen-layout">
        <div class="game-board-area">
          <div class="game-board" id="gameBoard"></div>
          <div class="game-pieces" id="gamePieces"></div>
        </div>
        
        <div class="game-controls-panel">
          <div class="game-setup" id="gameSetup">
            <h3>Подготовка</h3>
            <div class="players-setup">
              <label>Режим:</label>
              <select id="gameMode">
                <option value="solo">Соло</option>
                <option value="multi">Несколько игроков</option>
              </select>
            </div>
            <div id="playersList"></div>
            <button id="addPlayer" class="btn btn-add-player">+ Добавить игрока</button>
            <button id="startGame" class="btn">Начать игру</button>
          </div>
          
          <div class="game-controls" id="gameControls" style="display: none;">
            <h3 id="currentPlayerName"></h3>
            <p class="game-status" id="gameStatus"></p>
            <div class="dice-container">
              <div class="dice" id="dice" title="Нажмите, чтобы бросить">
                <span class="dice-question">?</span>
                <div class="dice-face">
                  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                </div>
              </div>
            </div>
            <div class="cell-interpretation" id="cellInterpretation"></div>
            <div class="game-history" id="gameHistory"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Focus Popup (before game) -->
    <div class="focus-popup-overlay" id="focusPopup" aria-hidden="true">
      <div class="focus-popup">
        <h3>Как сосредоточиться?</h3>
        <p class="focus-popup-desc">Перед началом игры сформулируйте вопрос или намерение. На чём вы хотите сосредоточиться в этом сеансе?</p>
        <textarea id="focusQuestion" placeholder="Например: Что мне мешает найти работу? Как пройдёт мой отпуск? Какой следующий шаг мне сделать?"></textarea>
        <button type="button" class="btn" id="focusPopupStart">Продолжить</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Игра Лила</p>
  </footer>

  <script src="game-data.js"></script>
  <script src="game.js"></script>
  <script>
    (function() {
      const focusPopup = document.getElementById('focusPopup');
      const focusPopupStart = document.getElementById('focusPopupStart');
      const startGameBtn = document.getElementById('startGame');

      function openFocusPopup() {
        focusPopup.setAttribute('aria-hidden', 'false');
        focusPopup.classList.add('is-open');
        document.body.style.overflow = 'hidden';
      }

      function closeFocusPopup() {
        focusPopup.setAttribute('aria-hidden', 'true');
        focusPopup.classList.remove('is-open');
        document.body.style.overflow = '';
      }

      startGameBtn && startGameBtn.addEventListener('click', function() {
        openFocusPopup();
      });

      focusPopupStart && focusPopupStart.addEventListener('click', function() {
        closeFocusPopup();
        if (typeof startGame === 'function') startGame();
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && focusPopup.classList.contains('is-open')) closeFocusPopup();
      });
    })();
  </script>
</body>
</html>
